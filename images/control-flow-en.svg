<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="540" fill="#f7f8fa"/>
  <text x="440" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#222">Control Flow (Mode A: fresh session every few moves)</text>
  <text x="440" y="56" text-anchor="middle" font-size="13" fill="#666">demo_loop.sh calls the OpenClaw agent with a fresh --session-key each time</text>

  <!-- session start -->
  <rect x="350" y="78" width="180" height="46" rx="23" fill="#e9f4fc" stroke="#2496ed"/>
  <text x="440" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#155a8a">session start</text>

  <!-- steps -->
  <rect x="330" y="150" width="220" height="64" rx="10" fill="#eef6ff" stroke="#3a7bd5"/>
  <text x="440" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b4f86">steps --count 4</text>
  <text x="440" y="196" text-anchor="middle" font-size="12" fill="#444">read+solve+press, up to 4 moves</text>
  <text x="440" y="208" text-anchor="middle" font-size="11" fill="#777">expectimax picks; all in one call</text>

  <!-- decision -->
  <polygon points="440,240 560,290 440,340 320,290" fill="#fffbe6" stroke="#c9a227"/>
  <text x="440" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6d12">which event?</text>
  <text x="440" y="304" text-anchor="middle" font-size="11" fill="#8a6d12">won / over / stuck / move</text>

  <!-- narrate (move) -->
  <rect x="600" y="258" width="240" height="64" rx="10" fill="#eafaf0" stroke="#2fa76a"/>
  <text x="720" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c7a49">narrate --text "..."</text>
  <text x="720" y="304" text-anchor="middle" font-size="12" fill="#444">one commentary line per batch</text>

  <!-- win/lose -->
  <rect x="320" y="380" width="240" height="70" rx="10" fill="#fdeef0" stroke="#d05c6e"/>
  <text x="440" y="406" text-anchor="middle" font-size="13" font-weight="bold" fill="#a8364a">end-of-game flourish</text>
  <text x="440" y="425" text-anchor="middle" font-size="12" fill="#444">won -&gt; narrate --speaker 1 (victory)</text>
  <text x="440" y="442" text-anchor="middle" font-size="12" fill="#444">over/stuck -&gt; closing line</text>

  <!-- newgame -->
  <rect x="600" y="384" width="240" height="60" rx="10" fill="#f3f0ff" stroke="#7a5cd0"/>
  <text x="720" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#553aa8">newgame</text>
  <text x="720" y="430" text-anchor="middle" font-size="12" fill="#444">start the next game</text>

  <!-- report / end -->
  <rect x="60" y="258" width="200" height="64" rx="10" fill="#eef0f3" stroke="#888"/>
  <text x="160" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">move budget reached?</text>
  <text x="160" y="304" text-anchor="middle" font-size="12" fill="#666">report, hand to next session</text>

  <!-- arrows -->
  <path d="M440,124 L440,148" stroke="#444" stroke-width="1.6" marker-end="url(#a2)"/>
  <path d="M440,214 L440,238" stroke="#444" stroke-width="1.6" marker-end="url(#a2)"/>

  <path d="M560,290 L598,290" stroke="#2fa76a" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="566" y="282" font-size="11" fill="#1c7a49">move</text>
  <path d="M720,258 C720,150 600,140 552,168" stroke="#2fa76a" stroke-width="1.6" fill="none" marker-end="url(#a2)"/>
  <text x="600" y="135" font-size="11" fill="#1c7a49">repeat until move budget reached</text>

  <path d="M440,340 L440,378" stroke="#d05c6e" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="450" y="364" font-size="11" fill="#a8364a">won / over / stuck</text>

  <path d="M560,414 L598,414" stroke="#7a5cd0" stroke-width="1.8" marker-end="url(#a2)"/>

  <path d="M720,444 C720,490 160,500 160,324" stroke="#888" stroke-width="1.6" fill="none" marker-end="url(#a2)"/>
  <text x="360" y="498" font-size="11" fill="#666">session ends -&gt; report -&gt; demo_loop launches the next session</text>

  <path d="M160,258 C160,150 250,150 328,176" stroke="#888" stroke-width="1.4" fill="none" stroke-dasharray="5 4" marker-end="url(#a2)"/>
  <text x="110" y="150" font-size="11" fill="#888">next session continues (no newgame)</text>
</svg>
