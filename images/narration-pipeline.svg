<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="Segoe UI, Hiragino Sans, Meiryo, sans-serif">
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="430" fill="#f7f8fa"/>
  <text x="440" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#222">実況パイプライン と 背景ライブ配信</text>

  <!-- narration row -->
  <text x="30" y="74" font-size="13" font-weight="bold" fill="#1c7a49">① 実況（音声 + アバター）</text>

  <rect x="30" y="86" width="160" height="60" rx="9" fill="#e9f4fc" stroke="#2496ed"/>
  <text x="110" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#155a8a">エージェント</text>
  <text x="110" y="130" text-anchor="middle" font-size="11.5" fill="#444">実況テキスト生成</text>

  <rect x="230" y="86" width="160" height="60" rx="9" fill="#eef6ff" stroke="#3a7bd5"/>
  <text x="310" y="108" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1b4f86">narrate</text>
  <text x="310" y="126" text-anchor="middle" font-size="11.5" fill="#444">POST /speak</text>
  <text x="310" y="140" text-anchor="middle" font-size="11" fill="#777">:8000 three-vrm</text>

  <rect x="430" y="86" width="160" height="60" rx="9" fill="#fff4e6" stroke="#e08a2b"/>
  <text x="510" y="108" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#9c5a14">VOICEVOX</text>
  <text x="510" y="126" text-anchor="middle" font-size="11.5" fill="#444">:50021 音声合成</text>
  <text x="510" y="140" text-anchor="middle" font-size="11" fill="#777">WAV + duration_sec</text>

  <rect x="630" y="86" width="220" height="60" rx="9" fill="#f3f0ff" stroke="#7a5cd0"/>
  <text x="740" y="108" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#553aa8">VRM アバター (コテコ)</text>
  <text x="740" y="126" text-anchor="middle" font-size="11.5" fill="#444">/ws で viseme 受信 → 口パク</text>
  <text x="740" y="140" text-anchor="middle" font-size="11" fill="#777">字幕表示 + 音声再生</text>

  <path d="M190,116 L228,116" stroke="#444" stroke-width="1.6" marker-end="url(#a3)"/>
  <path d="M390,116 L428,116" stroke="#444" stroke-width="1.6" marker-end="url(#a3)"/>
  <path d="M590,116 L628,116" stroke="#444" stroke-width="1.6" marker-end="url(#a3)"/>

  <text x="230" y="172" font-size="11" fill="#888">テンポ同期: /speak が返す duration_sec ぶん待ってから次手（PLAY2048_NARRATE_WAIT）</text>

  <!-- background row -->
  <line x1="30" y1="200" x2="850" y2="200" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="232" font-size="13" font-weight="bold" fill="#7a5cd0">② 背景ライブ配信（2048 盤面を背景に流す / EarthTourGuide 方式）</text>

  <rect x="30" y="248" width="180" height="64" rx="9" fill="#eef6ff" stroke="#3a7bd5"/>
  <text x="120" y="274" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1b4f86">2048 Chrome</text>
  <text x="120" y="292" text-anchor="middle" font-size="11.5" fill="#444">CDP :9222</text>
  <text x="120" y="306" text-anchor="middle" font-size="11" fill="#777">盤面を表示・ボット操作</text>

  <rect x="260" y="248" width="200" height="64" rx="9" fill="#eafaf0" stroke="#2fa76a"/>
  <text x="360" y="270" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1c7a49">play2048_bgcast.py</text>
  <text x="360" y="288" text-anchor="middle" font-size="11.5" fill="#444">Playwright CDP</text>
  <text x="360" y="302" text-anchor="middle" font-size="11" fill="#777">startScreencast (JPEG)</text>

  <rect x="510" y="248" width="180" height="64" rx="9" fill="#eafaf0" stroke="#2fa76a"/>
  <text x="600" y="270" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1c7a49">three-vrm</text>
  <text x="600" y="288" text-anchor="middle" font-size="11.5" fill="#444">/bg_ingest → /bg</text>
  <text x="600" y="302" text-anchor="middle" font-size="11" fill="#777">最新フレームを中継</text>

  <rect x="740" y="248" width="110" height="64" rx="9" fill="#f3f0ff" stroke="#7a5cd0"/>
  <text x="795" y="274" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#553aa8">表示ページ</text>
  <text x="795" y="292" text-anchor="middle" font-size="11.5" fill="#444">scene.</text>
  <text x="795" y="306" text-anchor="middle" font-size="11.5" fill="#444">background</text>

  <path d="M210,280 L258,280" stroke="#2fa76a" stroke-width="1.6" marker-end="url(#a3)"/>
  <text x="214" y="272" font-size="10.5" fill="#1c7a49">screencast</text>
  <path d="M460,280 L508,280" stroke="#2fa76a" stroke-width="1.6" marker-end="url(#a3)"/>
  <text x="466" y="272" font-size="10.5" fill="#1c7a49">ws</text>
  <path d="M690,280 L738,280" stroke="#7a5cd0" stroke-width="1.6" marker-end="url(#a3)"/>

  <text x="30" y="360" font-size="12" fill="#555">→ ①と②を合成: 1画面に「背景=2048盤面・前面=アバター＋字幕」。観客は AI が盤面を見て喋る絵を見る。</text>
  <text x="30" y="384" font-size="11.5" fill="#888">音声は VRM 表示 Chrome → PipeWire → xrdp-sink → Mac 側へ出力（コンテナ内では再生しない）。</text>
  <text x="30" y="406" font-size="11.5" fill="#888">最速モードでは narrate は発話を待たず即返り、盤面が先に進む（テンポ優先・実況は間引き）。</text>
</svg>
